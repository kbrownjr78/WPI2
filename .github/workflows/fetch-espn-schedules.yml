name: Fetch ESPN Sports Schedules

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  update-schedules:
    runs-on: ubuntu-latest
    
    # Permissions required to commit updated data back to the repo
    permissions:
      contents: write

    steps:
      # Step 1: Clone the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Initialize Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Initialize Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 4: Install necessary web scraping/request libraries
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Run the data extraction script
      - name: Fetch Schedules from ESPN
        run: python fetch_schedules.py

      # Step 6: Save and push changed data back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # Check if the data folder exists and contains files
          if [ -d "data" ] && [ "$(ls -A data)" ]; then
            git add data/*.json
            
            # Only commit if actual modifications exist
            if git diff --staged --quiet; then
              echo "No changes in schedules detected."
            else
              git commit -m "Automated Sync: Updated ESPN sports schedules [skip ci]"
              git push
            fi
          else
            echo "Data directory is empty. Nothing to commit."
          fi

