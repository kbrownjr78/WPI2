name: Fetch ESPN Sports Schedules

on:
  schedule:
    # Runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual execution from the GitHub Actions tab

jobs:
  update-schedules:
    runs-on: ubuntu-latest
    
    # Permissions required to commit updated data back to the repo
    permissions:
      contents: write

    steps:
      # Step 1: Clone the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Initialize Python
      - name: Set up Python
        uses: actions/setup-node@v4
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Optional: automatically caches dependencies if you add a requirements.txt

      # Step 3: Install necessary web scraping/request libraries
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # Step 4: Run the data extraction script
      - name: Fetch Schedules from ESPN
        run: python fetch_schedules.py

      # Step 5: Save and push changed data back to GitHub
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          git add data/*.json
          
          # Only commit if changes actually exist to avoid workflow errors
          if git diff --staged --quiet; then
            echo "No changes in schedules detected."
          else
            git commit -m "Automated Sync: Updated ESPN sports schedules [skip ci]"
            git push
          |
