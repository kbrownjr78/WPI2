name: Daily Sports Predictive Model Sync

on:
  schedule:
    - cron: '0 6 * * *'  # Triggers automatically at 06:00 UTC every day
  workflow_dispatch:     # Enables the manual "Run workflow" button in the GitHub Actions UI

permissions:
  contents: write

jobs:
  run-analytical-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests==2.32.3

    - name: Run Monte Carlo Simulation Engine
      run: python fetch_schedule.py

    - name: Commit and Push Analytical Outputs
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        
        git add sports_schedule.json predictions_summary.csv
        
        if git diff --staged --quiet; then
          echo "No predictive analytical deltas detected. Skipping commit operations."
        else
          git commit -m "data: Monte Carlo simulation & bet selection auto-update [skip ci]"
          git push origin HEAD:${{ github.ref }}
        fi
