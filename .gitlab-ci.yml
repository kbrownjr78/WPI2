stages:
  - fetch

fetch_sports_schedule:
  stage: fetch
  image: python:3.11-slim
  rules:
    # Only execute this job if triggered by a scheduled pipeline
    - if: $CI_PIPELINE_SOURCE == "schedule"
  before_script:
    - pip install --no-cache-dir --upgrade pip
    - pip install -r requirements.txt
  script:
    - python fetch_schedule.py
  artifacts:
    name: "sports-schedule-$CI_COMMIT_SHORT_SHA"
    paths:
      - sports_schedule.json
    expire_in: 7 days
